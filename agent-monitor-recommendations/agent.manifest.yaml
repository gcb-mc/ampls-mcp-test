name: monitor-recommendations-agent
description: >
  An AI agent that analyzes Azure Advisor recommendations and Azure Monitor metrics
  to provide prioritized, actionable recommendations for your Azure subscription.
  Covers cost optimization, performance, reliability, security, and operational excellence.
metadata:
  tags:
    - Agent Framework
    - Azure Monitor
    - Azure Advisor
    - Recommendations
    - Observability
template:
  name: monitor-recommendations-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: AZURE_SUBSCRIPTION_ID
      value: "{{AZURE_SUBSCRIPTION_ID}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
